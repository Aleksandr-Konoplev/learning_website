#file: noinspection UndefinedAction,UndefinedParamsPresent
name: CI/CD

on:
  push:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 .


  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: learning_website
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d learning_website"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: django-insecure-ci-secret-key
      DEBUG: "False"
      HOST: 127.0.0.1
      PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: learning_website
      POSTGRES_PASSWORD: postgres
      STRIPE_API_KEY: test_stripe_key
      EMAIL_HOST: smtp.example.com
      EMAIL_PORT: 465
      EMAIL_USE_TLS: "False"
      EMAIL_USE_SSL: "True"
      EMAIL_HOST_USER: ci@example.com
      EMAIL_HOST_PASSWORD: ci-password
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Apply migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_DIR }}"
            git fetch origin
            git checkout "${{ github.ref_name }}"
            git pull origin "${{ github.ref_name }}"
            sudo docker compose up -d --build
