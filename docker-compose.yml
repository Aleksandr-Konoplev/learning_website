services:
  db:
    image: postgres:17
    container_name: learning_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  # сохраняем данные БД вне контейнера
    healthcheck:  # проверка "здоровья" контейнера
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: learning_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:  # основной Django-приложение
    build: .
    container_name: learning_web
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      # Django подключается к БД по имени сервиса db
      HOST: db
      PORT: 5432  # порт БД
      # Celery использует Redis внутри docker-сети
      CELERY_BROKER_URL: redis://redis:6379/0  # адрес брокера (Redis)
      CELERY_RESULT_BACKEND: redis://redis:6379/0  # где хранить результаты задач
    volumes:
      - .:/app
      - media_data:/app/media
      - static_data:/app/static
    ports:
      - "8000:8000"  # доступ к Django с хоста
    depends_on:
      db:
        condition: service_healthy  # ждать, пока БД станет доступной
      redis:
        condition: service_healthy  # ждать Redis

  celery:
    build: .
    container_name: learning_celery
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      HOST: db
      PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:  # планировщик задач Celery (аналог cron)
    build: .
    container_name: learning_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info  # запуск планировщика
    env_file:
      - .env
    environment:
      HOST: db
      PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    build: ./nginx
    container_name: learning_nginx
    restart: unless-stopped
    ports:
      # Наружу публикуем только Nginx
      - "80:80"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_data:
  media_data: